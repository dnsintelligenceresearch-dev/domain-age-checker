{% extends "base.html" %}

{% block title %}Domain Age Checker - Home{% endblock %}

{% block content %}
<div class="search-section">
    <form id="domainForm" onsubmit="handleSubmit(event)">
        <div class="input-group">
            <input 
                type="text" 
                id="domainInput" 
                name="domain" 
                placeholder="Enter domain name (e.g., example.com)"
                required
                autocomplete="off"
            >
            <button type="submit" class="btn btn-primary">Check Domain</button>
        </div>
        <p class="help-text">Enter any valid domain to see its age and registration details</p>
    </form>
</div>

<div id="resultsContainer" style="display: none;">
    <div id="loadingSpinner" class="spinner" style="display: none;">
        <div class="spinner-circle"></div>
        <p>Checking domain...</p>
    </div>
    
    <div id="resultContent"></div>
</div>

<div id="errorContainer" style="display: none;">
    <div class="error-message">
        <strong>Error:</strong>
        <p id="errorMessage"></p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function handleSubmit(event) {
    event.preventDefault();
    const domain = document.getElementById('domainInput').value.trim();
    
    if (!domain) {
        showError('Please enter a domain name');
        return;
    }
    
    checkDomain(domain);
}

function checkDomain(domain) {
    const resultsContainer = document.getElementById('resultsContainer');
    const errorContainer = document.getElementById('errorContainer');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const resultContent = document.getElementById('resultContent');
    
    // Show loading state
    resultsContainer.style.display = 'block';
    errorContainer.style.display = 'none';
    loadingSpinner.style.display = 'flex';
    resultContent.innerHTML = '';
    
    // Fetch domain information
    fetch(`/check-domain?domain=${encodeURIComponent(domain)}`)
        .then(response => response.json())
        .then(data => {
            loadingSpinner.style.display = 'none';
            
            if (data.error) {
                showError(data.error);
                resultsContainer.style.display = 'none';
            } else {
                displayResults(data);
            }
        })
        .catch(error => {
            loadingSpinner.style.display = 'none';
            showError('Network error: Unable to fetch domain information');
            console.error('Fetch error:', error);
        });
}

function displayResults(data) {
    const resultContent = document.getElementById('resultContent');
    const errorContainer = document.getElementById('errorContainer');
    
    errorContainer.style.display = 'none';
    
    const statusClass = `status-${data.status}`;
    const statusText = data.status.charAt(0).toUpperCase() + data.status.slice(1);
    
    const html = `
        <div class="results-grid">
            <div class="card domain-info-card">
                <h2>Domain Information</h2>
                <div class="info-row">
                    <span class="label">Domain:</span>
                    <span class="value">${escapeHtml(data.domain)}</span>
                </div>
                <div class="info-row">
                    <span class="label">Status:</span>
                    <span class="value status-badge ${statusClass}">${statusText}</span>
                </div>
                <div class="info-row">
                    <span class="label">Registrar:</span>
                    <span class="value">${escapeHtml(data.registrar)}</span>
                </div>
            </div>

            <div class="card dates-card">
                <h2>Registration Dates</h2>
                <div class="info-row">
                    <span class="label">Created:</span>
                    <span class="value">${escapeHtml(data.created_date)}</span>
                </div>
                <div class="info-row">
                    <span class="label">Expires:</span>
                    <span class="value">${escapeHtml(data.expiration_date)}</span>
                </div>
            </div>

            <div class="card age-card">
                <h2>Domain Age</h2>
                <div class="age-display">
                    <p class="age-text">${escapeHtml(data.age)}</p>
                </div>
            </div>
        </div>
    `;
    
    resultContent.innerHTML = html;
}

function showError(errorMessage) {
    const errorContainer = document.getElementById('errorContainer');
    const errorMessageElement = document.getElementById('errorMessage');
    
    errorMessageElement.textContent = errorMessage;
    errorContainer.style.display = 'block';
    
    const resultsContainer = document.getElementById('resultsContainer');
    resultsContainer.style.display = 'none';
}

function escapeHtml(text) {
    const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, m => map[m]);
}

// Handle Enter key in input
document.getElementById('domainInput').addEventListener('keypress', (event) => {
    if (event.key === 'Enter') {
        handleSubmit(event);
    }
});
</script>
{% endblock %}
